# Configuração do rclone para backup em nuvem.
# Crie um remote chamado "cloud" apontando para seu provedor (S3, Google Drive,
# Backblaze B2, etc). Exemplo para um bucket S3-compatível:
#
# [cloud]
# type = s3
# provider = AWS
# access_key_id = SUA_CHAVE
# secret_access_key = SEU_SEGREDO
# region = us-east-1
#
# Depois ajuste RCLONE_REMOTE no .env (ex.: cloud:meu-bucket/cpvarejo).
# Enquanto este arquivo não tiver um remote válido, o backup mantém só a cópia local.

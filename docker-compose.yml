services:
  db:
    image: postgres:16-alpine
    container_name: cp_varejo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cpvarejo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cpvarejo}
      POSTGRES_DB: ${POSTGRES_DB:-cpvarejo}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cpvarejo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: cp_varejo_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cpvarejo}:${POSTGRES_PASSWORD:-cpvarejo}@db:5432/${POSTGRES_DB:-cpvarejo}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      UPLOAD_DIR: /app/uploads
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: seixastec_admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  # App de PDV — separado da administração, consome a mesma API.
  pdv:
    build:
      context: ./pdv
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: seixastec_pdv
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PDV_PORT:-8090}:80"

  backup:
    build: ./backup
    container_name: cp_varejo_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-cpvarejo}
      PGPASSWORD: ${POSTGRES_PASSWORD:-cpvarejo}
      PGDATABASE: ${POSTGRES_DB:-cpvarejo}
      # Backup em nuvem via rclone (configure um remote chamado "cloud").
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      RCLONE_REMOTE: ${RCLONE_REMOTE:-cloud:cpvarejo-backups}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backup/rclone.conf:/config/rclone/rclone.conf:ro
      - backup_local:/backups
      - uploads_data:/uploads:ro

volumes:
  db_data:
  backup_local:
  uploads_data:
